<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Brain Tumor Detection</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.2);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #5a67d8;
        }

        #preview {
            margin-top: 15px;
            border-radius: 10px;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">



    <h2>🤕Brain Tumor Detection🤯</h2>

    <input type="file" id="fileInput" onchange="previewImage()"><br><br>

    <img id="preview" width="200" style="display:none;"><br>

    <button onclick="uploadImage()">Predict</button>

    <div id="result"></div>

    <h3>🦭🧐Prediction History</h3>
    <ul id="historyList"></ul>

    <input type="text" id="userQuestion" placeholder="Ask something..." style="width: 80%; padding: 8px;">
    <br><br>
    <button onclick="askAI()">Ask AI</button>
    <div id="chatbotResponse"
         style="margin-top:15px; color:black; background:#f1f1f1; padding:10px; border-radius:8px; max-height:200px; overflow:auto;">
    </div>

</div>

<script>
    let lastPrediction = "";
    let lastConfidence = 0;

    function previewImage() {
        const file = document.getElementById("fileInput").files[0];
        const preview = document.getElementById("preview");

        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    }

    async function uploadImage() {
        const file = document.getElementById("fileInput").files[0];

        if (!file) {
            alert("Please select an image!");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        const resultText = document.getElementById("result");
        resultText.innerText = "🤔 Processing...";

        try {
            const response = await fetch("http://localhost:8080/api/predict", {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            lastPrediction = data.prediction;
            lastConfidence = data.confidence;

            if (data.prediction === "TUMOR") {
                resultText.innerText =
                    "🤦‍♂️Tumor Detected (" + (data.confidence * 100).toFixed(2) + "%)";
                resultText.style.color = "red";
            } else {
                resultText.innerText =
                    "😁✌️No Tumor (" + (data.confidence * 100).toFixed(2) + "%)";
                resultText.style.color = "green";
            }

        } catch (e) {
            resultText.innerText = "❌👺 Error";
        }
        loadHistory();
    }

    async function loadHistory() {
    try {
        const response = await fetch("http://localhost:8080/api/history");
        const data = await response.json();

        const list = document.getElementById("historyList");
        list.innerHTML = "";

        data.reverse().forEach(item => {
            const li = document.createElement("li");

            const confidence = (item.confidence * 100).toFixed(2);

            li.innerText =
                item.imageName + " → " +
                item.prediction + " (" + confidence + "%)";

            list.appendChild(li);
        });

    } catch (e) {
        console.error("Error loading history");
    }
}
    async function askAI() {
    const question = document.getElementById("userQuestion").value || "";

    if (!lastPrediction) {
    alert("Please predict first or ask a question!");
    return;
    }

    const responseBox = document.getElementById("chatbotResponse");
    responseBox.innerText = "🐧 Thinking...";

    try {
        const response = await fetch("http://localhost:8080/api/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prediction: lastPrediction,
                confidence: lastConfidence,
                question: question
            })
        });

        const data = await response.text();

        responseBox.innerText = data;

    } catch (e) {
        responseBox.innerText = "🤯 AI Error";
    }

}
    loadHistory();

     document.getElementById("userQuestion").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        askAI();
    }});

</script>

</body>
</html>

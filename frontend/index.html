<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>
</head>

<body style="text-align:center; font-family:Arial; background:#f5f5f5;">

<h1>👽✌️ Brain Tumor Detection</h1>

<input type="file" id="fileInput" onchange="previewImage()"><br><br>

<img id="preview" width="200" style="display:none; border-radius:10px;"><br><br>

<button onclick="uploadImage()" style="padding:10px 20px; font-size:16px;">
    Predict
</button>

<h2 id="result"></h2>

<script>

    function previewImage() {
        const file = document.getElementById("fileInput").files[0];
        const preview = document.getElementById("preview");

        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
    }

    async function uploadImage() {
        const fileInput = document.getElementById("fileInput");
        const file = fileInput.files[0];

        if (!file) {
            alert("Please select an image!");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        const resultText = document.getElementById("result");
        resultText.innerText = "😚Processing...";
        resultText.style.color = "black";

        try {
            const response = await fetch("http://localhost:8080/api/predict", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (data.prediction === "TUMOR") {
                resultText.innerText =
                    "🤦‍♂️Tumor Detected (" + (data.confidence * 100).toFixed(2) + "%)";
                resultText.style.color = "red";
            } else {
                resultText.innerText =
                    "😁No Tumor (" + (data.confidence * 100).toFixed(2) + "%)";
                resultText.style.color = "green";
            }

        } catch (error) {
            console.error(error);
            resultText.innerText = "❌ Error occurred";
            resultText.style.color = "black";
        }
    }

</script>

</body>
</html>

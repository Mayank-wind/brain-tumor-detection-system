<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Brain Tumor Detection</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
        }


        .container {
            position: relative;
            width: 500px;
            margin: 120px auto;
            padding: 40px;
            background: white;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            z-index: 1;
        }

        .container * {
            position: relative;
            z-index: 2;
        }

        .brain-bg {
            position: absolute;
            width: 300px;
            opacity: 0.08;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        input, button {
            margin: 10px;
            padding: 10px;
            border-radius: 6px;
        }

        button {
            background: #2b6cb0;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1e4e8c;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }


        .sidebar {
            position: fixed;
            top: 0;
            width: 300px;
            height: 100%;
            background: #bfdbfe;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
            padding: 20px;
            transition: 0.3s;
            z-index: 1000;
        }

        #chatSidebar {
            left: -320px;
        }

        #historySidebar {
            right: -320px;
        }


        #chatSidebar.open {
            left: 0;
        }

        #historySidebar.open {
            right: 0;
        }


        .arrow-btn {
            position: absolute;
            top: 20px;
            width: 32px;
            height: 32px;
            background: #2b6cb0;
            color: white;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;

            z-index: 9999;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #chatArrow {
            right: -20px;
        }

        #historyArrow {
            left: -20px;
        }


        .top-btn {
            position: fixed;
            top: 20px;
            padding: 12px;
            background: #2b6cb0;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2000;
        }

        #chatBtn { left: 20px; }
        #historyBtn { right: 20px; }

        /* HISTORY CARD */
        .history-card {
            background: #f5f7ff;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .history-card:hover {
            background: #e0e7ff;
        }

        .history-title {
            font-weight: bold;
        }

        .history-result {
            font-size: 14px;
            color: gray;
        }

        #predictBtn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        }

        #chatMessages {
        height: 300px;
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        }

        .user-msg {
        background: #667eea;
        color: white;
        padding: 8px;
        border-radius: 10px;
        align-self: flex-end;
        max-width: 80%;
        }

        .bot-msg {
        background: #f1f1f1;
        color: black;
        padding: 8px;
        border-radius: 10px;
        align-self: flex-start;
        max-width: 80%;
        }

        .chat-bg {
        position: absolute;
        width: 120px;
        opacity: 0.08;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        }

        #chatMessages {
        scroll-behavior: smooth;
        }

    </style>
</head>

<body>


<div id="chatBtn" class="top-btn" onclick="toggleChat()">🐧Chatbot</div>
<div id="historyBtn" class="top-btn" onclick="toggleHistory()">🧐Histories</div>


<div id="chatSidebar" class="sidebar">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
         class="chat-bg">
    <div id="chatArrow" class="arrow-btn" onclick="toggleChat()">❮</div>

    <h3 style="margin-top: 45px;">🐧 AI Assistant</h3>

    <input type="text" id="userQuestion" placeholder="Ask about your condition 🫡" style="width:80%">
    <button onclick="askAI()">Send</button>

    <div id="chatMessages"></div>
</div>


<div id="historySidebar" class="sidebar">

    <div id="historyArrow" class="arrow-btn" onclick="toggleHistory()">❯</div>

    <h3>🤓 History</h3>

    <div id="historyList"></div>
</div>


<div class="container">

    <img class="brain-bg"
         src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Brain_MRI.jpg">

    <h2>🧠 Brain Tumor Detection </h2>

    <input type="text" placeholder="Test name (optional)"><br>

    <input type="file" id="fileInput" onchange="resetButton()"><br>

    <button id="predictBtn" onclick="uploadImage()">Predict</button>

    <div id="result"></div>

</div>

<script>
    let chatHistory = [];
    let lastPrediction = "";
    let lastConfidence = 0;

    function toggleChat() {
        const chat = document.getElementById("chatSidebar");
        const arrow = document.getElementById("chatArrow");

        const isOpen = chat.classList.contains("open");

        if (isOpen) {
            chat.classList.remove("open");
            arrow.style.display = "none";
        } else {
            chat.classList.add("open");
            arrow.style.display = "flex";
        }
    }

    function toggleHistory() {
        const history = document.getElementById("historySidebar");
        const arrow = document.getElementById("historyArrow");

        const isOpen = history.classList.contains("open");

        if (isOpen) {
            history.classList.remove("open");
            arrow.style.display = "none";
        } else {
            history.classList.add("open");
            arrow.style.display = "flex";
            loadHistory();
        }
    }

    async function uploadImage() {
    const file = document.getElementById("fileInput").files[0];
    const btn = document.getElementById("predictBtn");

    if (!file) {
        alert("Select image");
        return;
    }

    // 🔄 Change button to loading
    btn.innerText = "🤔 Predicting...";
    btn.disabled = true;

    const formData = new FormData();
    formData.append("file", file);

    const result = document.getElementById("result");
    result.innerText = "🤐 Processing...";

    try {
        const res = await fetch("http://localhost:8080/api/predict", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        lastPrediction = data.prediction;
        lastConfidence = data.confidence;

        if (data.prediction === "TUMOR") {
            result.innerText = "🤦‍♂️ Tumor Detected (" + (data.confidence * 100).toFixed(2) + "%)";
            result.style.color = "red";
        } else {
            result.innerText = "👌😉 No Tumor (" + (data.confidence * 100).toFixed(2) + "%)";
            result.style.color = "green";
        }

        btn.innerText = "✅ Predicted";

    } catch (e) {
        result.innerText = "Error";
        btn.innerText = "❌ Error";
    }

    setTimeout(() => {
        btn.disabled = false;
    }, 1500);
}

    async function loadHistory() {
        const res = await fetch("http://localhost:8080/api/history");
        const data = await res.json();

        const list = document.getElementById("historyList");
        list.innerHTML = "";

        data.forEach(item => {
            const card = document.createElement("div");
            card.className = "history-card";

            const confidence = (item.confidence * 100).toFixed(2);

            card.innerHTML = `
                <div class="history-title">${item.imageName}</div>
                <div class="history-result">
                    ${item.prediction} (${confidence}%)
                </div>
            `;

            card.onclick = () => {
                alert(
                    "Name: " + item.imageName + "\n" +
                    "Result: " + item.prediction + "\n" +
                    "Confidence: " + confidence + "%"
                );
            };

            list.appendChild(card);
        });
    }

    async function askAI() {
    const chatBox = document.getElementById("chatMessages");

    if(!chatBox){
    console.error("ChatMessages not found ");
    alert("Chat UI missing!");
    return;
    }

    const question = document.getElementById("userQuestion").value;
    if (!question) return;

    const userMsg = document.createElement("div");
    userMsg.className = "user-msg";
    userMsg.innerText = question;
    chatBox.appendChild(userMsg);

    chatHistory.push("User: " + question);

    document.getElementById("userQuestion").value = "";

    const botMsg = document.createElement("div");
    botMsg.className = "bot-msg";
    botMsg.innerText = "🤔 Thinking...";
    chatBox.appendChild(botMsg);

    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch("http://localhost:8080/api/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prediction: lastPrediction,
                confidence: lastConfidence,
                question: chatHistory.join("\n")
            })
        });
        const data = await response.text();
        botMsg.innerText = data;
        chatHistory.push("AI: " + data);

    } catch (e) {
        botMsg.innerText = "❌ AI Error";
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}

    function resetButton() {
    const btn = document.getElementById("predictBtn");

    btn.innerText = "Predict";
    btn.disabled = false;
}
    document.getElementById("userQuestion").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault(); // stop page refresh
        askAI();
    }
});

</script>

</body>
</html>

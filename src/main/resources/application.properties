spring.application.name=brain.tumor.backend
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/brain_tumor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysql123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.python-api-url=${PYTHON_API_URL:http://localhost:5000/predict}
app.ollama-url=${OLLAMA_URL:http://localhost:11434/api/generate}

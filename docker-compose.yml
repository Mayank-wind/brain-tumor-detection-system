services:
  mysql:
    image: mysql:8.4
    container_name: brain-tumor-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: brain_tumor_db
      MYSQL_ROOT_PASSWORD: mysql123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pmysql123"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brain-tumor-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/brain_tumor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql123
      PYTHON_API_URL: http://host.docker.internal:5000/predict
      OLLAMA_URL: http://host.docker.internal:11434/api/generate
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"

volumes:
  mysql_data:
